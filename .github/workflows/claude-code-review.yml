name: Claude Code Review

# Delegates to the org reusable claude-review workflow which adds:
#   - SHA-pinned anthropics/claude-code-action (was @v1 mutable here)
#   - Diff-size threshold (default 500 lines) so large refactors get a
#     "review locally" hint instead of burning API credits
#   - Sticky comment + skip-on-large-diff behavior shared across the org
#
# Drops `synchronize` from the trigger types (matches the reusable's
# documented call shape and deploy#139): re-running the reviewer on
# every push to a PR branch is expensive and rarely useful — `opened`,
# `ready_for_review`, and `reopened` cover the meaningful entry points.
#
# Public-repo consumption of nex-crm/.github reusables works because
# .github has access_level=organization. Proven by docs-link-check.yml
# (docs#32, docs#33).
#
# NOTE: 98294031… is the COMMIT sha v0.6.2 dereferences to. The
# annotated-tag-object sha (34310b13…) cannot be used as a `uses:` ref —
# GitHub Actions silently fails resolution. See nex-crm/.github#63.

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    uses: nex-crm/.github/.github/workflows/claude-review.yml@98294031b84bf07f8bdf227940225ba21e9d2678 # v0.6.2
    # Docs repo content is Markdown/MDX, not the JS/TS/Go/Py defaults
    # in the reusable. Count .md/.mdx in the diff-size calc so big
    # docs rewrites are correctly diverted to the local-review hint
    # instead of being treated as zero-line PRs and reviewed regardless.
    with:
      diff-file-globs: "*.md *.mdx *.json"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
