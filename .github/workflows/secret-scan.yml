name: Secret Scan

# Delegates to the org's reusable scan-secrets workflow which runs
# secretlint with @secretlint/secretlint-rule-preset-recommend over
# files changed in the diff. Strictly stronger than the previous
# hand-rolled regex scanner: the recommend preset covers AWS, GCP,
# Slack, npm, Anthropic, GitHub PATs (classic + fine-grained), Stripe,
# SendGrid, generic private-key formats, and others — a superset of the
# 13 patterns the inline scanner used to check.
#
# Requirements (satisfied in this repo by the same PR that introduced
# this workflow shape):
#   - secretlint + @secretlint/secretlint-rule-preset-recommend in
#     devDependencies (package.json)
#   - .secretlintrc.json extending the preset
#
# Public-repo consumption of nex-crm/.github reusables works because
# the .github repo has access_level=organization. Validated end-to-end
# by docs-link-check.yml in this repo (see docs#32, docs#33).
#
# NOTE: 98294031… is the COMMIT sha v0.6.2 dereferences to. The
# annotated-tag-object sha (34310b13…) cannot be used as a `uses:` ref —
# GitHub Actions silently fails resolution. See nex-crm/.github#63.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan-secrets:
    uses: nex-crm/.github/.github/workflows/scan-secrets.yml@98294031b84bf07f8bdf227940225ba21e9d2678 # v0.6.2
