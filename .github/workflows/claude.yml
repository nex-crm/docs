name: Claude Code

# Delegates to the org's reusable claude.yml which routes @claude
# mentions in issues, PR review comments, PR reviews, and issue
# bodies/titles to the SHA-pinned anthropics/claude-code-action.
#
# The reusable bundles:
#   - SHA-pinned actions/checkout + claude-code-action (was @v1 mutable
#     in the previous local copy of this workflow)
#   - Shared `if:` predicate matching nex-crm/app/.github/workflows/claude.yml
#   - Org-wide ANTHROPIC_API_KEY secret (replaces the previous
#     CLAUDE_CODE_OAUTH_TOKEN flow — both secrets authenticate Claude;
#     the reusable standardises on the org-level ANTHROPIC_API_KEY).
#
# Public-repo consumption of nex-crm/.github reusables works because
# .github has access_level=organization. Proven by docs-link-check.yml
# (docs#32, docs#33).
#
# NOTE: 98294031… is the COMMIT sha v0.6.2 dereferences to. The
# annotated-tag-object sha (34310b13…) cannot be used as a `uses:` ref —
# GitHub Actions silently fails resolution. See nex-crm/.github#63.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write
  actions: read

jobs:
  claude:
    uses: nex-crm/.github/.github/workflows/claude.yml@98294031b84bf07f8bdf227940225ba21e9d2678 # v0.6.2
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
