name: docs-link-check

# Delegates to nex-crm/.github reusable. Catches dead links in Markdown
# + MDX before they reach customers (especially relevant on this public
# docs site). PR runs are scoped to doc paths; the weekly cron catches
# external-link rot.

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    # NOTE: v0.7.1 is a lightweight tag (object.type=commit) so the SHA
    # below resolves directly. v0.6.0–v0.6.2 were annotated tags whose
    # tag-object SHA (e.g. 34310b13…) cannot be used as a `uses:` ref —
    # workflow silently fails with conclusion=failure and zero jobs.
    # See nex-crm/.github#63.
    uses: nex-crm/.github/.github/workflows/docs-link-check.yml@ef2321b9cd3a83561a6a4bca70df635d58766cb0 # ratchet:nex-crm/.github/.github/workflows/docs-link-check.yml@v2
